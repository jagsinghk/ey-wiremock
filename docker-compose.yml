services:
  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock-jsonplaceholder
    ports:
      - "8080:8080"
    volumes:
      - ./mappings:/home/wiremock/mappings
      - ./__files:/home/wiremock/__files
    command: --verbose --global-response-templating
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  api-tests:
    image: gradle:8.7-jdk17
    container_name: wiremock-posts-api-tests
    working_dir: /workspace
    depends_on:
      wiremock:
        condition: service_healthy
    volumes:
      - ./:/workspace
    environment:
      - WIREMOCK_BASE_URL=http://wiremock:8080
      - GRADLE_USER_HOME=/tmp/.gradle
    command: >
      bash -lc "
      ready=0;
      for i in {1..30}; do
        (echo > /dev/tcp/wiremock/8080) >/dev/null 2>&1 && ready=1 && break;
        echo 'Waiting for WireMock to be ready on wiremock:8080...';
        sleep 2;
      done;
      if [ \"$ready\" -ne 1 ]; then
        echo 'WireMock did not become ready in time.';
        exit 1;
      fi;
      gradle clean test --no-daemon -Dapi.base.url=$WIREMOCK_BASE_URL"
