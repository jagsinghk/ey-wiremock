services:
  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock-jsonplaceholder
    ports:
      - "8080:8080"
    volumes:
      - ./mappings:/home/wiremock/mappings
      - ./__files:/home/wiremock/__files
    command: --verbose --global-response-templating

  api-tests:
    image: gradle:8.7-jdk17
    container_name: wiremock-posts-api-tests
    working_dir: /workspace
    depends_on:
      - wiremock
    volumes:
      - ./:/workspace
    environment:
      - GRADLE_USER_HOME=/tmp/.gradle
    command: >
      bash -lc "
      ready=0;
      for i in {1..30}; do
        (echo > /dev/tcp/wiremock/8080) >/dev/null 2>&1 && ready=1 && break;
        echo 'Waiting for WireMock to be ready on wiremock:8080...';
        sleep 2;
      done;
      if [ \"$$ready\" -ne 1 ]; then
        echo 'WireMock did not become ready in time.';
        exit 1;
      fi;
      gradle clean test --no-daemon -Dwiremock.base.url=http://wiremock:8080"

  perf-tests:
    image: gradle:8.7-jdk17
    container_name: wiremock-perf-tests
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - GRADLE_USER_HOME=/tmp/.gradle
    command: >
      gradle gatlingRun --no-daemon -Dwiremock.base.url=https://jsonplaceholder.typicode.com
